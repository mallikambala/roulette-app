<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Roulette P/L Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Include Chart.js for visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div id="app-wrapper">
    <!-- INLINE HEADER ROW -->
    <div class="header-row">
        <h2 class="app-title">Roulette P/L Calculator</h2>
        
        <!-- NAVIGATION TABS -->
        <div class="tabs-container">
            <button class="tab-btn active" data-target="tab-calculator" onclick="window.App.openTab('tab-calculator')">🧮 Malli's RuleEngine</button>
            <button class="tab-btn" data-target="tab-analytics" onclick="window.App.openTab('tab-analytics')">📈 Visual Analytics</button>
        </div>
    </div>

    <!-- TAB 1: CALCULATOR & TABLE -->
    <div id="tab-calculator" class="tab-content active-tab">
        <div class="main-section">
            <section class="left-section">
                <h3>Select Roulette Number:</h3>
                <div class="roulette-layout">
                    <div class="zero">
                        <button type="button" class="green" data-number="0">0</button>
                    </div>
                    <div class="grid">
                        {% for r in roulette_numbers if r.num != 0 %}
                            <button type="button" class="{{ r.color }}" data-number="{{ r.num }}">{{ r.num }}</button>
                        {% endfor %}
                    </div>
                </div>
                
                <div class="action-buttons">
                    <button type="button" class="action-btn reset-btn" onclick="window.App.reset()">Reset All</button>
                    <button type="button" class="action-btn undo-btn" onclick="window.App.undo()">Undo Last</button>
                </div>
            </section>

            <section class="right-section" id="right-section-container">
                <!-- Summary Box will be rendered here by JavaScript -->
            </section>
        </div>

        <section id="table-wrapper">
            <!-- History Table will be rendered here by JavaScript -->
        </section>
    </div>

    <!-- TAB 2: VISUAL ANALYTICS -->
    <div id="tab-analytics" class="tab-content">
        <div class="analytics-card">
            <h3>📈 Bankroll Trend & Streak Tracker</h3>
            <div id="chart-wrapper" class="chart-wrapper">
                <canvas id="plChart"></canvas>
            </div>
            <div id="chart-empty-state" class="summary-box empty-state" style="margin-top: 20px; display:none;">
                <p><b>Not enough data!</b></p>
                <p class="context-line reason-neutral">Process at least 1 bet to generate the analytics chart.</p>
            </div>
        </div>
    </div>
</div>

<!-- DATA ISLAND -->
<script id="initial-state" type="application/json">
    {
        "history": {{ initial_history | tojson | safe }}
    }
</script>

<script>
    (function() {
        const App = {
            history: [],
            chartInstance: null,
            isProcessing: false, 

            init(initialState) {
                this.history = initialState.history || [];
                this.bindEvents();
                this.render();
            },

            bindEvents() {
                document.querySelectorAll('.roulette-layout button').forEach(btn => {
                    btn.addEventListener('click', (e) => this.handleSpin(e.currentTarget.dataset.number));
                });
            },

            async sendRequest(action, data = {}) {
                if (this.isProcessing) return; 
                this.isProcessing = true;

                const formData = new FormData();
                formData.append('action', action);
                for (const key in data) {
                    formData.append(key, data[key]);
                }

                try {
                    const response = await fetch('/process_click', {
                        method: 'POST',
                        body: formData
                    });
                    if (!response.ok) throw new Error('Network response was not ok');
                    
                    const state = await response.json();
                    this.history = state.history;
                    this.render();
                } catch (error) {
                    console.error('Fetch error:', error);
                    alert('An error occurred. Please refresh the page.');
                } finally {
                    this.isProcessing = false;
                }
            },

            handleSpin(number) {
                this.sendRequest('spin', { number });
            },

            undo() {
                this.sendRequest('undo');
            },

            reset() {
                if (confirm('Are you sure you want to reset the entire session?')) {
                    this.sendRequest('reset');
                }
            },

            openTab(tabId) {
                document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active-tab'));
                document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
                
                document.getElementById(tabId).classList.add('active-tab');
                document.querySelector(`.tab-btn[data-target="${tabId}"]`).classList.add('active');

                if (tabId === 'tab-analytics') {
                    this.renderChart();
                }
            },

            render() {
                this.renderSummary();
                this.renderTable();
                if (document.querySelector('#tab-analytics.active-tab')) {
                    this.renderChart();
                }
            },

            renderSummary() {
                const container = document.getElementById('right-section-container');
                if (this.history.length === 0) {
                    container.innerHTML = `
                        <div class="summary-box empty-state">
                            <p><b>Game Status:</b> Waiting to start...</p>
                            <p class="context-line reason-neutral">Select a number on the left grid to process your first spin!</p>
                        </div>`;
                    return;
                }

                const latest = this.history[this.history.length - 1];
                const stats = this.calculatePredictionStats();
                
                let predBoxHtml = '';
                if (latest.predicted_numbers) {
                    predBoxHtml = `
                        <div class="prediction-box ${stats.curr_miss_streak >= 3 ? 'prediction-box-danger' : ''}">
                            <p class="next-bet-title">
                                <b>Next Bet:</b> Dozen ${latest.next_bet[0]} & Dozen ${latest.next_bet[1]} 
                                <span class="mode-tag">(${latest.next_mode})</span>
                            </p>
                            <p><b>Suggested Numbers To Play:</b></p>
                            <div class="prediction-grid">
                                ${latest.predicted_numbers.map(n => `<span class="pred-num">${n}</span>`).join('')}
                            </div>
                            <div class="pred-stats">
                                <span>🎯 Hits: <b>${stats.hits}</b></span>
                                <span>❌ Misses: <b>${stats.misses}</b></span>
                                <span>📊 Win Rate: <b>${stats.rate}%</b></span>
                            </div>
                            <div class="pred-stats max-stats">
                                <span class="max-hit">🔥 Max Hit Streak: <b>${stats.max_hit_streak}</b></span>
                                <span class="max-miss">🧊 Max Miss Streak: <b>${stats.max_miss_streak}</b></span>
                            </div>
                        </div>`;
                }

                container.innerHTML = `
                    <div class="summary-box">
                        <p style="font-size: 1.1em; margin-bottom: 8px;"><b>Final P/L:</b> ₹${latest.total}</p>
                        <div class="high-low-row">
                            <span><b>Highest Total:</b> ₹${latest.highest_total}</span>
                            <span><b>Lowest Total:</b> ₹${latest.lowest_total}</span>
                        </div>
                        ${predBoxHtml}
                        ${latest.warning ? `<p class="warning-msg live-warning">${latest.warning}</p>` : ''}
                    </div>`;
            },

            renderTable() {
                const wrapper = document.getElementById('table-wrapper');
                if (this.history.length < 2) {
                    wrapper.innerHTML = '';
                    return;
                }

                let rowsArray = [];
                
                for (let i = 1; i < this.history.length; i++) {
                    const prev = this.history[i - 1];
                    const curr = this.history[i];
                    
                    let dozenDisplay = `${prev.dozen} → ${curr.dozen}`;
                    if (curr.pl > 0) dozenDisplay = `${prev.dozen} → <span class='highlight'>${curr.dozen}</span>`;
                    if (prev.dozen == curr.dozen) dozenDisplay = `<span class='highlight'>${prev.dozen} → ${curr.dozen}</span>`;
                    
                    let betDisplay = curr.bet ? `Dozen ${curr.bet[0]} & ${curr.bet[1]} (${curr.mode})` : "No Action (Push)";
                    if (curr.pl > 0 && curr.bet) {
                        betDisplay = curr.dozen == curr.bet[0] 
                            ? `<span class='highlight'>Dozen ${curr.bet[0]}</span> & ${curr.bet[1]} (${curr.mode})`
                            : `${curr.bet[0]} & <span class='highlight'>Dozen ${curr.bet[1]}</span> (${curr.mode})`;
                    }

                    let plDisplay = `➖ Push (₹0)`;
                    if (curr.pl > 0) plDisplay = `✅ +₹${curr.pl}`;
                    if (curr.pl < 0) plDisplay = `❌ -₹${Math.abs(curr.pl)}`;
                    
                    let predHtml = "<span class='small-preds'>-</span>";
                    
                    let tempMissStreak = 0;
                    for (let j = 1; j <= i; j++) {
                        const tempPrev = this.history[j-1];
                        const tempCurr = this.history[j];
                        if (tempPrev.predicted_numbers) {
                            if (tempPrev.predicted_numbers.some(n => Number(n) === Number(tempCurr.number))) {
                                tempMissStreak = 0;
                            } else {
                                tempMissStreak++;
                            }
                        }
                    }

                    if (prev.predicted_numbers) {
                        const formattedNums = prev.predicted_numbers.map(n => 
                            Number(n) === Number(curr.number) ? `<span class='pred-hit'>${n}</span>` : n
                        ).join(', ');
                        
                        predHtml = `<div class='small-preds'>${formattedNums}</div>`;
                        if (tempMissStreak >= 3) {
                            predHtml += `<span class='miss-warning'>⚠️ Miss Streak ${tempMissStreak}!</span>`;
                        }
                    }

                    let betTdClass = curr.warning ? 'warning-cell' : '';
                    let predTdClass = tempMissStreak >= 3 ? 'warning-cell' : '';

                    rowsArray.push(`
                        <tr>
                            <td><span class='sno'>${i}</span> ${prev.number} → ${curr.number}</td>
                            <td>${dozenDisplay}</td>
                            <td class="${betTdClass}">${curr.warning ? '⚠️ ' : ''}${betDisplay}</td>
                            <td class="${predTdClass}">${predHtml}</td>
                            <td class="${curr.pl > 0 ? 'win' : (curr.pl < 0 ? 'loss' : 'neutral')}">${plDisplay}</td>
                            <td>₹${curr.total}</td>
                            <td>
                                <form method="post" action="/recalc/${i}">
                                    <button type="submit" class="action-btn recalc-btn" title="Recalculate flow from here">🔄</button>
                                </form>
                            </td>
                        </tr>
                    `);
                }

                wrapper.innerHTML = `
                    <section class="table-container">
                        <h3>Spin History & Recalculation Engine</h3>
                        <table>
                            <thead>
                                <tr>
                                    <th>Spin (S.No)</th><th>Dozen Transition</th><th>Your Bet (Active Mode)</th>
                                    <th>Predicted Numbers</th><th>Spin P/L Change</th><th>Running Total</th><th>Recalc</th>
                                </tr>
                            </thead>
                            <tbody>${rowsArray.reverse().join('')}</tbody>
                        </table>
                    </section>`;
            },

            calculatePredictionStats() {
                let hits = 0, misses = 0, currHit = 0, currMiss = 0, maxHit = 0, maxMiss = 0;
                if (this.history.length > 1) {
                    for (let i = 1; i < this.history.length; i++) {
                        const prev = this.history[i - 1];
                        const curr = this.history[i];
                        if (prev.predicted_numbers) {
                            if (prev.predicted_numbers.some(n => Number(n) === Number(curr.number))) {
                                hits++; currHit++; currMiss = 0;
                            } else {
                                misses++; currMiss++; currHit = 0;
                            }
                            maxHit = Math.max(maxHit, currHit);
                            maxMiss = Math.max(maxMiss, currMiss);
                        }
                    }
                }
                const total = hits + misses;
                const rate = total > 0 ? ((hits / total) * 100).toFixed(1) : 0;
                return { hits, misses, rate, curr_miss_streak: currMiss, max_hit_streak: maxHit, max_miss_streak: maxMiss };
            },

            renderChart() {
                const chartWrapper = document.getElementById('chart-wrapper');
                const emptyState = document.getElementById('chart-empty-state');

                if (this.history.length < 2) {
                    chartWrapper.style.display = 'none';
                    emptyState.style.display = 'block';
                    return;
                }
                
                chartWrapper.style.display = 'block';
                emptyState.style.display = 'none';

                const ctx = document.getElementById('plChart').getContext('2d');
                const fullHistory = [{sno: 0, total: 0, pl: 0, warning: null}, ...this.history];
                
                const labels = fullHistory.map((h, i) => i === 0 ? 'Start' : `Spin ${i}`);
                const totals = fullHistory.map(h => h.total);
                const pointBgColors = fullHistory.map(h => h.pl > 0 ? '#2ecc71' : (h.pl < 0 ? '#e74c3c' : '#95a5a6'));
                const pointRadii = fullHistory.map(h => h.warning ? 10 : 5);
                const pointStyles = fullHistory.map(h => h.warning ? 'rectRot' : 'circle');

                if (this.chartInstance) {
                    this.chartInstance.destroy();
                }

                this.chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels,
                        datasets: [{
                            label: 'Running Total (₹)',
                            data: totals,
                            borderColor: '#bdc3c7',
                            borderWidth: 2,
                            pointBackgroundColor: pointBgColors,
                            pointBorderColor: '#ffffff',
                            pointBorderWidth: 1.5,
                            pointRadius: pointRadii,
                            pointHoverRadius: 12,
                            pointStyle: pointStyles,
                            fill: false,
                            tension: 0.1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { y: { title: { display: true, text: 'Total Bankroll (₹)' } } }
                    }
                });
            }
        };

        window.App = App;
        
        // Safely load initial data
        const stateText = document.getElementById('initial-state').textContent;
        const initialState = JSON.parse(stateText || '{}');
        App.init(initialState);
    })();
</script>

</body>
</html>
